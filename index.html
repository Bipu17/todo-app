<!DOCTYPE html>
<html>
  <head>
    <title>To-do App</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head> 

  <body class="bg-gray-100 min-h-screen flex justify-center items-center p-6">
    <main class="bg-white p-6 rounded-xl shadow-md w-full max-w-md text-center">
      <h1 class="text-2xl font-bold mb-2">To-do App</h1>

    <div class="flex gap-2 mb-4">
      <input id="taskInput" type="text" placeholder="Enter a task" class="border p-2 rounded-lg w-full">
      <button onclick="addTask()" class="bg-blue-500 text-white px-4 py-2 rounded-lg"> Add </button>
    </div>
    <ul id="taskList" class="text-left">
      <li class="bg-gray-100 p-2 rounded-lg mb-2">Simple task</li>
      
    </ul>
    </main>

    <script>
      function addTask(){
        
        let task = document.getElementById("taskInput").value;

        if (task === ""){return;}
        let li = document.createElement("li");
        li.innerText = task;
        li.className = "bg-gray-100 p-2 rounded-lg mb-2 flex justify-between items-center";
        let deleteButton = document.createElement("button");
        deleteButton.innerText = "Delete";
        deleteButton.className = "bg-red-500 text-white px-2 py-1 rounded";
        deleteButton.onclick=function(){li.remove();};
        li.appendChild(deleteButton);
        document.getElementById("taskList").appendChild(li);
        document.getElementById("taskInput").value="";
      }
    </script>
    
  </body>
</html>
