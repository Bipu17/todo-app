<!DOCTYPE html>
<html>
  <head>
    <title>To-do App</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head> 

  <body class="bg-gray-100 min-h-screen flex justify-center items-center p-6">
    <main class="bg-white p-6 rounded-xl shadow-md w-full max-w-md text-center">
      <h1 class="text-2xl font-bold mb-2">To-do App</h1>
      <p id="taskCount" class="text-gray-600 mb-4">
        Tasks: 0
      </p>

    <div class="flex gap-2 mb-4">
      <input id="taskInput" type="text" placeholder="Enter a task" class="border p-2 rounded-lg w-full">
      <button id="addButton" class="bg-blue-500 text-white px-4 py-2 rounded-lg"> Add </button>
    </div>
    <ul id="taskList" class="text-left">  
    </ul>
    </main>

    <script>
      let tasks = [];
      function addTask(){
        
        let task = document.getElementById("taskInput").value;

        if (task === ""){return;}
        tasks.push(task);
        localStorage.setItem("tasks", JSON.stringify(tasks));
        let li = document.createElement("li");
        li.innerText = task;
        li.className = "bg-gray-100 p-2 rounded-lg mb-2 flex justify-between items-center";
        li.onclick = function(){
          li.classList.toggle("line-through");
          li.classList.toggle("opacity-50");
        }
      
        let deleteButton = document.createElement("button");
        deleteButton.innerText = "Delete";
        deleteButton.className = "bg-red-500 text-white px-2 py-1 rounded";
        deleteButton.onclick=function(){
          li.remove();
          updateTaskCount();};
        li.appendChild(deleteButton);
        document.getElementById("taskList").appendChild(li);
        updateTaskCount();
        document.getElementById("taskInput").value="";
      }
       document.getElementById("addButton").addEventListener("click",addTask);
        document.getElementById("taskInput").addEventListener("keypress",function(event){ if (event.key === "Enter")
        {addTask();}
        });
      function updateTaskCount(){
        let totalTasks = document.getElementById("taskList").children.length;
        document.getElementById("taskCount").innerText = "Tasks: " + totalTasks;
      }
      window.onload = function() {
        
        let savedTasks = localStorage.getItem("tasks");
        if (savedTasks){
          tasks = JSON.parse(savedTasks);
        }
        tasks.forEach(function(task){
          let li = document.createElement("li");
          li.innerText = task;
          li.className = "bg-gray-100 p-2 rounded-lg mb-2";
          document.getElementById("taskList").appendChild(li);
      });
        updateTaskCount();
      }
    </script>

       
  </body>
</html>
